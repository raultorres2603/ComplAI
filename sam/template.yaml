AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: ComplAI Lambda – local SAM development template

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - production
    Description: Deployment environment (development or production)
  LambdaRegion:
    Type: String
    Default: eu-west-1
    Description: AWS region for Lambda and S3
  OpenRouterApiKey:
    Type: String
    Description: OpenRouter API key (passed from CI or manually)
  ApiKeyElprat:
    Type: String
    Default: ''
    Description: API key for city 'elprat'. Generate with ApiKeyGenerator CLI.
  SesFromEmail:
    Type: String
    Default: ''
    Description: Sender email for SES (passed from CI or manually)
  # Per-city SES recipient emails. Format: AWS_SES_TO_EMAIL_<CITYID>
  # Both API_KEY_<CITYID> AND AWS_SES_TO_EMAIL_<CITYID> must be set for a city to receive reports.
  SesToEmailElprat:
    Type: String
    Default: ''
    Description: Recipient email for city 'elprat' (e.g., elprat@example.com). Set both this and ApiKeyElprat.
  SesRegion:
    Type: String
    Default: eu-west-1
    Description: AWS region for SES (passed from CI or manually)
  SesReportingEnabled:
    Type: String
    Default: 'true'
    Description: Enable scheduled statistics report Lambda (set to 'false' to disable local poller)
  TokenTelegramElprat:
    Type: String
    Default: ''
    Description: Telegram bot token for city 'elprat'. Get from @BotFather.
  TelegramWebhookSecretElprat:
    Type: String
    Default: ''
    Description: Webhook secret token for Telegram bot (city 'elprat').
Conditions:
  IsProduction: !Equals [!Ref Environment, production]

Globals:
  Function:
    Timeout: 60
    MemorySize: 1024
    Runtime: java25
    Environment:
      Variables:
        OPENROUTER_API_KEY: !Ref OpenRouterApiKey
        AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
        COMPLAINTS_REGION: !Ref LambdaRegion
        AWS_SES_REGION: !Ref SesRegion
        AWS_SES_FROM_EMAIL: !Ref SesFromEmail
        AWS_SES_TO_EMAIL_ELPRAT: !Ref SesToEmailElprat

Resources:
  ComplAILambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ComplAILambdaRole-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Description: !Sub IAM role for ComplAI Lambda (${Environment}) with least privilege
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ComplAIWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ComplAIWorkerRole-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Description: !Sub IAM role for ComplAI worker Lambda (${Environment})
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ComplAIScheduledReportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ComplAIScheduledReportRole-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Description: !Sub IAM role for ComplAI scheduled report Lambda (${Environment}) — SES + CloudWatch Logs
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ComplAILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ComplAIFunction}
      RetentionInDays: !If [IsProduction, 90, 7]

  ComplAIWorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ComplAIRedactorFunction}
      RetentionInDays: !If [IsProduction, 90, 7]

  ComplAIScheduledReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ComplAIScheduledReportFunction}
      RetentionInDays: !If [IsProduction, 90, 7]

  ComplAIErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComplAILogGroup
      FilterPattern: "{ $.errorCode = * }"
      MetricTransformations:
        - MetricNamespace: !Sub ComplAI/${Environment}
          MetricName: AuditErrorCount
          MetricValue: 1
          Dimensions:
            - Key: endpoint
              Value: $.endpoint
            - Key: errorCode
              Value: $.errorCode

  ComplAILatencyMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComplAILogGroup
      FilterPattern: "{ $.latencyMs = * }"
      MetricTransformations:
        - MetricNamespace: !Sub ComplAI/${Environment}
          MetricName: AuditLatencyMs
          MetricValue: $.latencyMs
          Dimensions:
            - Key: endpoint
              Value: $.endpoint

  ProceduresBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-procedures-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365
      DeletionPolicy: Retain

  NewsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-news-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365
      DeletionPolicy: Retain

  EventsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-events-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365
      DeletionPolicy: Retain

  CityInfoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-cityinfo-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365
      DeletionPolicy: Retain

  ComplaintsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-complaints-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 30

  FeedbackBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub complai-feedback-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: !If [IsProduction, 90, 30]

  RedactDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub complai-redact-dlq-${Environment}
      MessageRetentionPeriod: 604800  # 7 days

  RedactQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub complai-redact-${Environment}
      VisibilityTimeout: 90
      MessageRetentionPeriod: 14400  # 4 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RedactDLQ.Arn
        maxReceiveCount: 3

  FeedbackDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub complai-feedback-dlq-${Environment}
      MessageRetentionPeriod: 604800  # 7 days

  FeedbackQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub complai-feedback-${Environment}
      VisibilityTimeout: 90
      MessageRetentionPeriod: 14400  # 4 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FeedbackDLQ.Arn
        maxReceiveCount: 3

  ComplAIFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/libs/complai-all.jar
      Handler: io.micronaut.function.aws.proxy.payload2.APIGatewayV2HTTPEventFunction::handleRequest
      Runtime: java25
      Architectures: [x86_64]
      MemorySize: 1024
      Timeout: 60
      Role: !GetAtt ComplAILambdaRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          OPENROUTER_API_KEY: !Ref OpenRouterApiKey
          PROCEDURES_BUCKET: !Ref ProceduresBucket
          PROCEDURES_REGION: !Ref LambdaRegion
          NEWS_BUCKET: !Ref NewsBucket
          NEWS_REGION: !Ref LambdaRegion
          AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
          OPENROUTER_REQUEST_TIMEOUT_SECONDS: "45"
          OPENROUTER_OVERALL_TIMEOUT_SECONDS: "45"
          OPENROUTER_MAX_RETRIES: "3"
          OPENROUTER_MODEL: openrouter/free
          API_KEY_ENABLED: 'true'
          API_KEY_ELPRAT: !Ref ApiKeyElprat
          # Telegram Bot — per-city token and webhook secret
          TOKEN_TELEGRAM_ELPRAT: !Ref TokenTelegramElprat
          TELEGRAM_WEBHOOK_SECRET_ELPRAT: !Ref TelegramWebhookSecretElprat
          REDACT_QUEUE_URL: !Ref RedactQueue
          FEEDBACK_QUEUE_URL: !Ref FeedbackQueue
          FEEDBACK_QUEUE_REGION: !Ref LambdaRegion
          COMPLAINTS_BUCKET: !Ref ComplaintsBucket
          COMPLAINTS_REGION: !Ref LambdaRegion
          COMPLAI_DEFAULT_CITY_ID: elprat
          AWS_SES_REGION: !Ref LambdaRegion
          AWS_SES_FROM_EMAIL: !Ref SesFromEmail
          EVENTS_BUCKET: !Ref EventsBucket
          EVENTS_REGION: !Ref LambdaRegion
          CITYINFO_BUCKET: !Ref CityInfoBucket
          CITYINFO_REGION: !Ref LambdaRegion
          FEEDBACK_BUCKET_NAME: !Ref FeedbackBucket
          AWS_SES_TO_EMAIL_ELPRAT: !Ref SesToEmailElprat

      Events:
        ProxyRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        ProxyGreedy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  ComplAIRedactorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/libs/complai-all.jar
      Handler: cat.complai.services.worker.RedactWorkerHandler::handleRequest
      Runtime: java25
      Architectures: [x86_64]
      MemorySize: 1024
      Timeout: 60
      Role: !GetAtt ComplAIWorkerRole.Arn
      Environment:
        Variables:
          OPENROUTER_API_KEY: !Ref OpenRouterApiKey
          OPENROUTER_REQUEST_TIMEOUT_SECONDS: "45"
          OPENROUTER_OVERALL_TIMEOUT_SECONDS: "45"
          OPENROUTER_MAX_RETRIES: "3"
          OPENROUTER_MODEL: openrouter/free
          COMPLAINTS_BUCKET: !Ref ComplaintsBucket
          COMPLAINTS_REGION: !Ref LambdaRegion
          PROCEDURES_BUCKET: !Ref ProceduresBucket
          PROCEDURES_REGION: !Ref LambdaRegion
          NEWS_BUCKET: !Ref NewsBucket
          NEWS_REGION: !Ref LambdaRegion
          AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
          AWS_SES_REGION: !Ref LambdaRegion
          AWS_SES_FROM_EMAIL: !Ref SesFromEmail
          EVENTS_BUCKET: !Ref EventsBucket
          EVENTS_REGION: !Ref LambdaRegion
          CITYINFO_BUCKET: !Ref CityInfoBucket
          CITYINFO_REGION: !Ref LambdaRegion
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt RedactQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  ComplAIFeedbackWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/libs/complai-all.jar
      Handler: cat.complai.services.worker.FeedbackWorkerHandler::handleRequest
      Runtime: java25
      Architectures: [x86_64]
      MemorySize: 512
      Timeout: 60
      Role: !GetAtt ComplAIWorkerRole.Arn
      Environment:
        Variables:
          FEEDBACK_QUEUE_URL: !Ref FeedbackQueue
          FEEDBACK_BUCKET_NAME: !Ref FeedbackBucket
          FEEDBACK_QUEUE_REGION: !Ref LambdaRegion
          AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
          AWS_SES_REGION: !Ref LambdaRegion
          AWS_SES_FROM_EMAIL: !Ref SesFromEmail
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt FeedbackQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # IAM Policy for the scheduled report role — inline (SAM doesn't support managed policy for custom role)
  ComplAIScheduledReportPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ComplAIScheduledReportPolicy-${Environment}
      Roles:
        - !Ref ComplAIScheduledReportRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: ses:SendEmail
            Resource: "*"
            Condition:
              StringEquals:
                ses:FromAddress: !Ref SesFromEmail
          - Effect: Allow
            Action:
              - logs:FilterLogEvents
            Resource:
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ComplAILambda-${Environment}:*
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ComplAIRedactorLambda-${Environment}:*
              - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ComplAIFeedbackWorkerLambda-${Environment}:*
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::complai-procedures-${Environment}
              - !Sub arn:aws:s3:::complai-procedures-${Environment}/*
              - !Sub arn:aws:s3:::complai-events-${Environment}
              - !Sub arn:aws:s3:::complai-events-${Environment}/*
              - !Sub arn:aws:s3:::complai-news-${Environment}
              - !Sub arn:aws:s3:::complai-news-${Environment}/*
              - !Sub arn:aws:s3:::complai-cityinfo-${Environment}
              - !Sub arn:aws:s3:::complai-cityinfo-${Environment}/*
              - !Sub arn:aws:s3:::complai-complaints-${Environment}
              - !Sub arn:aws:s3:::complai-complaints-${Environment}/*
              - !Sub arn:aws:s3:::complai-feedback-${Environment}
              - !Sub arn:aws:s3:::complai-feedback-${Environment}/*

  ComplAIScheduledReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../build/libs/complai-all.jar
      Handler: cat.complai.services.ses.SesScheduledReportHandler::handleRequest
      Runtime: java25
      Architectures: [x86_64]
      MemorySize: 512
      Timeout: 60
      Role: !GetAtt ComplAIScheduledReportRole.Arn
      Environment:
        Variables:
          AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
          AWS_SES_REGION: !Ref LambdaRegion
          AWS_SES_FROM_EMAIL: !Ref SesFromEmail
          PROCEDURES_BUCKET: !Ref ProceduresBucket
          EVENTS_BUCKET: !Ref EventsBucket
          COMPLAINTS_BUCKET: !Ref ComplaintsBucket
          FEEDBACK_BUCKET_NAME: !Ref FeedbackBucket
          OPENROUTER_API_KEY: !Ref OpenRouterApiKey
          ENVIRONMENT: !Ref Environment
          API_KEY_ELPRAT: !Ref ApiKeyElprat
          AWS_SES_TO_EMAIL_ELPRAT: !Ref SesToEmailElprat
          NEWS_BUCKET: !Ref NewsBucket
          NEWS_REGION: !Ref LambdaRegion
          CITYINFO_BUCKET: !Ref CityInfoBucket
          CITYINFO_REGION: !Ref LambdaRegion
          EVENTS_REGION: !Ref LambdaRegion
      Events:
        ScheduledReport:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * MON *)

Outputs:
  ComplAILambdaFunctionName:
    Description: Name of the deployed ComplAI Lambda function
    Value: !Ref ComplAIFunction
  ComplAILambdaArn:
    Description: ARN of the deployed ComplAI Lambda function
    Value: !GetAtt ComplAIFunction.Arn
  ComplAIRedactQueueUrl:
    Description: SQS queue URL for the async redact flow
    Value: !Ref RedactQueue
  ComplAIComplaintsBucketName:
    Description: S3 bucket for generated complaint PDFs
    Value: !Ref ComplaintsBucket
  ComplAIFeedbackQueueUrl:
    Description: SQS queue URL for the async feedback flow
    Value: !Ref FeedbackQueue
  ComplAIFeedbackBucketName:
    Description: S3 bucket for user feedback JSON files
    Value: !Ref FeedbackBucket
  ComplAINewsBucketName:
    Description: S3 bucket for city news corpus
    Value: !Ref NewsBucket
