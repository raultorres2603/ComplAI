plugins {
    id("io.micronaut.application") version "4.6.2"
}

version = "1.0.0"
group = "cat.complai"

repositories {
    mavenCentral()
}

dependencies {
    testImplementation("org.mockito:mockito-core:5.2.0")
    testImplementation("org.mockito:mockito-inline:5.2.0")
    testImplementation("org.mockito:mockito-junit-jupiter:5.2.0")
    implementation("com.amazonaws:aws-lambda-java-events")
    implementation("software.amazon.awssdk:cloudwatchlogs")
    implementation("software.amazon.awssdk:cloudwatch")
    implementation("io.micronaut:micronaut-http-client")
    implementation("io.micronaut.email:micronaut-email-amazon-ses")
    // Reactor support for SSE streaming on @Client interfaces (Publisher<String> return type)
    implementation("io.micronaut.reactor:micronaut-reactor")
    // Micronaut retry support for declarative retry with @Retryable annotation
    implementation("io.micronaut:micronaut-retry")
    // Micronaut JSON support via Jackson - provides JsonMapper bean
    implementation("io.micronaut:micronaut-jackson-databind")
    // micronaut-function-aws-api-proxy contains APIGatewayV2HTTPEventFunction,
    // which is the correct handler class for an HTTP API (API Gateway v2) + Lambda setup.
    // micronaut-aws-apigateway was the old REST/payload-1 module and does not contain this class.
    implementation("io.micronaut.aws:micronaut-function-aws-api-proxy")
    implementation("io.micronaut.aws:micronaut-function-aws")
    implementation("io.micronaut.cache:micronaut-cache-caffeine")
    runtimeOnly("ch.qos.logback:logback-classic")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")

    // Jackson Joda module — required for ScheduledEvent deserialization (time field uses org.joda.time.DateTime)
    implementation("com.fasterxml.jackson.datatype:jackson-datatype-joda:2.17.2")

    // PDF generation — OpenPDF replaces PDFBox because PDFBox requires AWT native
    // libraries (libawt) which are unavailable in GraalVM native-image on Lambda.
    // OpenPDF has zero AWT dependency and works reliably in native-image environments.
    implementation("com.github.librepdf:openpdf:2.0.5")

    // Jsoup for HTML parsing
    implementation("org.jsoup:jsoup:1.17.2")
    // AWS SDK for S3 and SQS integration
    implementation("software.amazon.awssdk:s3")
    implementation("software.amazon.awssdk:sqs")

    // GraalVM native image support
    implementation("io.micronaut:micronaut-graal")
    implementation("io.micronaut.aws:micronaut-function-aws-custom-runtime")
    implementation("io.micronaut.aws:micronaut-aws-sdk-v2")
    implementation("software.amazon.awssdk:url-connection-client")

    // JJWT — used by OidcIdentityTokenValidator for OIDC/JWK validation (HS256 JWT auth was removed).
    // jjwt-api is the compile-time dependency; impl and jackson are runtime-only.
    // jjwt-jackson bridges jjwt's claim serialisation to the Jackson 2.x already on the classpath.
    implementation("io.jsonwebtoken:jjwt-api:0.12.6")
    runtimeOnly("io.jsonwebtoken:jjwt-impl:0.12.6")
    runtimeOnly("io.jsonwebtoken:jjwt-jackson:0.12.6")
}


java {
    // Ensure Gradle compiles with Java 25 for both toolchain and source/target compatibility.
    // This makes the build deterministic and matches the Lambda runtime (java25).
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }

    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.addAll(['-Xlint:all,-path,-serial,-processing'])
}


micronaut {
    // "lambda_provided" is the correct runtime for API Gateway proxy handlers (APIGatewayV2HTTPEventFunction).
    // "lambda_provided" means the Lambda runtime is provided by AWS — no embedded HTTP server is started.
    runtime("lambda_provided")
    testRuntime("junit5")
    processing {
        incremental(true)
        annotations("cat.complai.*")
    }
}

application {
    mainClass.set("cat.complai.App" )
}


// CI test task: explicit task for the CI pipeline. It runs tests with JUnit Platform
// and is configured to fail the build if any test fails (Gradle default behaviour).
// Having this task makes the CI script intention-revealing and allows running
// tests independently of assembling the shadow JAR.

import org.gradle.api.tasks.testing.logging.TestExceptionFormat
import org.gradle.api.tasks.testing.logging.TestLogEvent

tasks.withType(Test).configureEach {
    // Suppress Netty native access warning and class data sharing warning
    jvmArgs(
        '--enable-native-access=ALL-UNNAMED',
        '-Xshare:off'
    )
    useJUnitPlatform()

    testLogging {
        events TestLogEvent.FAILED, TestLogEvent.SKIPPED, TestLogEvent.PASSED
        exceptionFormat = TestExceptionFormat.SHORT
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }
}

tasks.register('ciTest', Test) {
    description = 'Run unit tests for CI pipeline. Fails build on test failures.'
    group = 'verification'

    // Ensure we run the project's test classes with the test classpath
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
}

graalvmNative {
    binaries {
        main {
            imageName.set("complai")
            buildArgs.add("--no-fallback")
            buildArgs.add("--enable-url-protocols=http,https")
            buildArgs.add("-H:+AddAllCharsets")
            buildArgs.add("-H:+ReportExceptionStackTraces")
        }
    }
}

tasks.named("dockerfileNative", io.micronaut.gradle.docker.NativeImageDockerfile) {
    graalArch.set("aarch64")
    args("-Xmx64m")
}
