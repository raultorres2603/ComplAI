# Workflow to create a GitHub Release when a tagged commit is merged into master and the version is new.
#
# - Triggers only on push to master with a tag.
# - Extracts version from build.gradle.
# - Checks if a release for this version exists.
# - If not, creates a release with the tag and version.

name: Release version
on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  release:
    name: Create Release if New Version
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed to access tags

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        id: prev_tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$TAG_NAME$" | head -n1 || true)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate commit log
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG:" > changes.txt
            git log --oneline "$PREV_TAG..$TAG_NAME" >> changes.txt
          else
            echo "## Changes in $TAG_NAME (initial release or no previous tag):" > changes.txt
            git log --oneline >> changes.txt
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NOTES="Automated release for $TAG_NAME.\n\n$(cat changes.txt)"
          gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "$NOTES"
