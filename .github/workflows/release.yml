# Workflow to create a GitHub Release when a tagged commit is merged into master and the version is new.
#
# - Triggers only on push to master with a tag.
# - Extracts version from build.gradle.
# - Checks if a release for this version exists.
# - If not, creates a release with the tag and version.

name: Release on Tag Merge to Master

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  release:
    name: Create Release if New Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to access tags

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION=$(grep '^version' build.gradle | head -n1 | sed -E "s/version[ \t]*=[ \t]*['\"]([^'\"]+)['\"]/\1/")
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from build.gradle" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=$(git describe --tags --abbrev=0)
          VERSION=${{ steps.version.outputs.version }}
          if [ "$TAG_NAME" != "v$VERSION" ]; then
            echo "ERROR: Tag name ($TAG_NAME) does not match version (v$VERSION) from build.gradle." >&2
            exit 1
          fi
          gh release create "$TAG_NAME" --title "Release $VERSION" --notes "Automated release for version $VERSION."

