name: Scrape and Upload

# Triggered manually from the GitHub Actions UI.
# Builds the fat JAR once, then selectively runs one or all scrapers.
# Each scraper step pair re-configures AWS credentials for its target region.
# Bucket names are derived from the chosen environment:
#   complai-{type}-development  /  complai-{type}-production
#
# Required GitHub environment variables (set per environment):
#   PROCEDURES_REGION, NEWS_REGION, EVENTS_REGION, CITYINFO_REGION, TRANSPARENCY_REGION

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: development
      city:
        description: >
          City identifier — must match a
          src/main/resources/scrapers/procedures-mapping-<city>.json file.
        required: true
        type: string
        default: elprat
      scraper:
        description: 'Which scraper to run (all = run every scraper sequentially)'
        required: true
        type: choice
        options:
          - all
          - procedures
          - news
          - events
          - cityinfo
          - transparency
        default: all

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew clean shadowJar

      # -----------------------------------------------------------------------
      # DIAGNOSTIC STEPS - Test connectivity to elprat.digital
      # -----------------------------------------------------------------------
      - name: Test connectivity to elprat.digital (basic)
        continue-on-error: true
        run: |
          echo "🔍 Testing basic connectivity to elprat.digital..."
          curl -v --max-time 60 -w "\n%{http_code}\n" https://www.elprat.digital/ 2>&1 | tail -30
          echo ""
          echo "DNS resolution check:"
          nslookup elprat.digital

      - name: Test connectivity with NewsScraper User-Agent headers
        continue-on-error: true
        run: |
          echo "🔍 Testing with NewsScraper User-Agent headers..."
          curl -v \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Accept-Encoding: gzip, deflate" \
            -H "Connection: keep-alive" \
            --max-time 60 \
            -w "\n%{http_code}\n" \
            https://www.elprat.digital/ 2>&1 | tail -30

      - name: Test connectivity (simple status check)
        continue-on-error: true
        run: |
          echo "🔍 Simple HTTP status check (no verbose output)..."
          echo "Request started at $(date)"
          curl -s -w "HTTP Status: %{http_code}\nTime Total: %{time_total}s\n" \
            --max-time 60 \
            https://www.elprat.digital/ > /dev/null
          echo "Request finished at $(date)"

      # -----------------------------------------------------------------------
      # PROCEDURES
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (procedures)
        if: inputs.scraper == 'all' || inputs.scraper == 'procedures'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.PROCEDURES_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape procedures and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'procedures'
        env:
          PROCEDURES_BUCKET: complai-procedures-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.ProcedureScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # NEWS
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (news)
        if: inputs.scraper == 'all' || inputs.scraper == 'news'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.NEWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape news and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'news'
        env:
          NEWS_BUCKET: complai-news-${{ inputs.environment }}
          NEWS_REGION: ${{ vars.NEWS_REGION }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.NewsScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # EVENTS
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (events)
        if: inputs.scraper == 'all' || inputs.scraper == 'events'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.EVENTS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape events and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'events'
        env:
          EVENTS_BUCKET: complai-events-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.EventScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # CITYINFO
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (cityinfo)
        if: inputs.scraper == 'all' || inputs.scraper == 'cityinfo'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.CITYINFO_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape city info and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'cityinfo'
        env:
          CITYINFO_BUCKET: complai-cityinfo-${{ inputs.environment }}
          CITYINFO_REGION: ${{ vars.CITYINFO_REGION }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.CityInfoScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # TRANSPARENCY
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (transparency)
        if: inputs.scraper == 'all' || inputs.scraper == 'transparency'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.TRANSPARENCY_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape transparency and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'transparency'
        env:
          TRANSPARENCY_BUCKET: complai-transparency-${{ inputs.environment }}
          TRANSPARENCY_REGION: ${{ vars.TRANSPARENCY_REGION }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.TransparencyScraper "${{ inputs.city }}"
