name: Scrape and Upload

# Triggered manually from the GitHub Actions UI.
# Builds the fat JAR once, then selectively runs one or all scrapers.
# Each scraper step pair re-configures AWS credentials for its target region.
# Bucket names are derived from the chosen environment:
#   complai-{type}-development  /  complai-{type}-production
#
# Required GitHub environment variables (set per environment):
#   PROCEDURES_REGION, NEWS_REGION, EVENTS_REGION, CITYINFO_REGION

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: development
      city:
        description: >
          City identifier — must match a
          src/main/resources/scrapers/procedures-mapping-<city>.json file.
        required: true
        type: string
        default: elprat
      scraper:
        description: 'Which scraper to run (all = run every scraper sequentially)'
        required: true
        type: choice
        options:
          - all
          - procedures
          - news
          - events
          - cityinfo
        default: all

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew clean shadowJar

      # -----------------------------------------------------------------------
      # PROCEDURES
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (procedures)
        if: inputs.scraper == 'all' || inputs.scraper == 'procedures'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.PROCEDURES_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape procedures and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'procedures'
        env:
          PROCEDURES_BUCKET: complai-procedures-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.ProcedureScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # NEWS
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (news)
        if: inputs.scraper == 'all' || inputs.scraper == 'news'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.NEWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape news and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'news'
        env:
          NEWS_BUCKET: complai-news-${{ inputs.environment }}
          NEWS_REGION: ${{ vars.NEWS_REGION }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.NewsScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # EVENTS
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (events)
        if: inputs.scraper == 'all' || inputs.scraper == 'events'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.EVENTS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape events and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'events'
        env:
          EVENTS_BUCKET: complai-events-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.EventScraper "${{ inputs.city }}"

      # -----------------------------------------------------------------------
      # CITYINFO
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (cityinfo)
        if: inputs.scraper == 'all' || inputs.scraper == 'cityinfo'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.CITYINFO_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape city info and upload to S3
        if: inputs.scraper == 'all' || inputs.scraper == 'cityinfo'
        env:
          CITYINFO_BUCKET: complai-cityinfo-${{ inputs.environment }}
          CITYINFO_REGION: ${{ vars.CITYINFO_REGION }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.CityInfoScraper "${{ inputs.city }}"
