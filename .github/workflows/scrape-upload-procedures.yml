name: Scrape and Upload Procedures

# Triggered manually from the GitHub Actions UI.
# Crawls a city's procedure website using the corresponding mapping file
# (src/main/resources/scrapers/procedures-mapping-<city>.json),
# produces procedures-<city>.json, and uploads it to the procedures S3 bucket.
#
# AWS credentials must be stored as repository secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# The target bucket is derived automatically from the chosen environment:
#   complai-procedures-development  /  complai-procedures-production

on:
  workflow_dispatch:
    inputs:
      city:
        description: >
          City identifier — must match a
          src/main/resources/scrapers/procedures-mapping-<city>.json file.
        required: true
        type: string
        default: elprat
      environment:
        description: 'Target deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: development

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew clean shadowJar

      - name: Scrape procedures and upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PROCEDURES_BUCKET: complai-procedures-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.pratespais.ProcedureScraper "${{ inputs.city }}"
