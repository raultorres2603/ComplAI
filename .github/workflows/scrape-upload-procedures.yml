name: Scrape and Upload Procedures

# Triggered manually from the GitHub Actions UI.
# Crawls a city's procedure website using the corresponding mapping file
# (src/main/resources/scrapers/procedures-mapping-<city>.json),
# produces procedures-<city>.json, and uploads it to the procedures S3 bucket.
#
# AWS credentials are obtained via OIDC (github-cdk-deploy-role). No static key
# secrets are required. The target bucket is derived automatically from the chosen environment:
#   complai-procedures-development  /  complai-procedures-production

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      city:
        description: >
          City identifier — must match a
          src/main/resources/scrapers/procedures-mapping-<city>.json file.
        required: true
        type: string
        default: elprat
      environment:
        description: 'Target deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: development

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build fat JAR
        run: ./gradlew clean shadowJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.PROCEDURES_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Scrape procedures and upload to S3
        env:
          PROCEDURES_BUCKET: complai-procedures-${{ inputs.environment }}
        run: |
          java -cp build/libs/complai-all.jar \
            cat.complai.scrapper.ProcedureScraper "${{ inputs.city }}"
