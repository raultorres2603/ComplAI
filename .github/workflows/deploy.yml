# Workflow for building the Micronaut JAR and deploying via AWS CDK.
#
# Triggers:
#   - Manual (workflow_dispatch): choose environment (development | production) and branch.
#     Deploying to production is only allowed from the master branch; the guard job
#     enforces this before anything else runs.
#   - Automatic (pull_request): any PR opened/updated/reopened deploys to development only.
#     Production is never touched automatically.
#
# Environments:
#   - development: no approval required, uses secrets.OPENROUTER_API_KEY from the
#                  "development" GitHub Environment.
#   - production:  requires manual approval (configure a required reviewer in
#                  Settings → Environments → production), uses secrets.OPENROUTER_API_KEY
#                  from the "production" GitHub Environment.
name: Build & Deploy to AWS CDK

# Grant the workflow permission to request OIDC id-tokens and read repository contents.
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'
      branch:
        description: 'Branch to deploy (production only accepts master)'
        required: true
        default: 'master'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ---------------------------------------------------------------------------
  # Guard: fail fast when a manual dispatch tries to deploy production from a
  # branch other than master. This is the only place this rule is enforced, so
  # it is explicit and visible in the job list.
  # ---------------------------------------------------------------------------
  guard:
    name: Validate deployment inputs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Block production deploy from non-master branch
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.environment == 'production' &&
          inputs.branch != 'master'
        run: |
          echo "ERROR: Production can only be deployed from master. Got branch: '${{ inputs.branch }}'." >&2
          exit 1

      - name: Confirm deployment target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Automatic PR trigger → deploying to: development"
          else
            echo "Manual trigger → deploying to: ${{ inputs.environment }} from branch: ${{ inputs.branch }}"
          fi

  # ---------------------------------------------------------------------------
  # Build: compile and test the JAR, then upload it as an artifact.
  # ---------------------------------------------------------------------------
  build:
    name: Build JAR
    needs: [guard]
    runs-on: ubuntu-latest
    # guard only runs on workflow_dispatch; on pull_request it is skipped.
    # A skipped dependency would block this job, so we explicitly allow both
    # "success" (manual dispatch that passed guard) and "skipped" (PR trigger).
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # For manual dispatches, check out the requested branch.
          # For PRs, the default checkout (merge commit) is correct.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Verify branch exists
        # Only relevant for manual dispatches. Provides a clear error message if the
        # branch input is mistyped, instead of letting a later step fail cryptically.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git show-ref --verify --quiet "refs/remotes/origin/${{ inputs.branch }}"; then
            echo "ERROR: Branch '${{ inputs.branch }}' does not exist in the repository." >&2
            exit 1
          fi
          echo "Branch '${{ inputs.branch }}' verified."

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run CI tests
        # Fail early if any test fails, before building the deployable artifact.
        run: ./gradlew --no-daemon ciTest

      - name: Build JAR (shadowJar)
        run: ./gradlew --no-daemon clean shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: lambda-jar
          path: build/libs/*.jar

  # ---------------------------------------------------------------------------
  # Deploy: download the JAR and deploy the correct CDK stack for the target
  # environment. The GitHub Environment binding is what gates production behind
  # a required manual approval (configured in Settings → Environments).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      # Bind to the matching GitHub Environment so that:
      #   - development: deploys immediately (no approval required).
      #   - production:  waits for a required reviewer to approve
      #                  (configure in Settings → Environments → production).
      # Each environment holds its own OPENROUTER_API_KEY secret.
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    outputs:
      environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Resolve deployment target
        id: target
        # Produce a single output used throughout this job to avoid repeating the ternary.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: lambda-jar
          path: build/libs

      - name: Verify JAR artifact exists
        run: |
          echo "Checking for build/libs/*.jar artifacts..."
          if ! ls build/libs/*.jar 1>/dev/null 2>&1; then
            echo "ERROR: No JAR found in build/libs. Ensure the build job produced an artifact." >&2
            exit 1
          fi
          echo "Found artifacts:"
          ls -1 build/libs/*.jar

      - name: Verify OPENROUTER_API_KEY is set
        # Do NOT print the key value. Only log that it is present and its length.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "ERROR: OPENROUTER_API_KEY secret is not set for the '${{ steps.target.outputs.environment }}' environment." >&2
            exit 1
          fi
          LEN=$(echo -n "$OPENROUTER_API_KEY" | wc -c | tr -d ' ')
          echo "OPENROUTER_API_KEY is set (length: $LEN, value: [REDACTED])."

      - name: Verify OPENROUTER_MODEL is set
        env:
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          if [ -z "$OPENROUTER_MODEL" ]; then
            echo "ERROR: OPENROUTER_MODEL variable is not set for the '${{ steps.target.outputs.environment }}' environment." >&2
            exit 1
          fi
          echo "OPENROUTER_MODEL is set (value: [REDACTED])."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.PROCEDURES_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Node.js for CDK
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache npm for CDK
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/npm
          key: ${{ runner.os }}-node-${{ hashFiles('cdk/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        run: cd cdk && npm install

      - name: Build CDK TypeScript
        run: cd cdk && npm run build

      - name: Validate CDK installation
        run: |
          node -v
          npm -v
          echo "CDK (global) version:" && npx cdk --version || true

      # Deploy StorageStack first so the complai-deployments-<env> bucket exists
      # before we try to upload the JAR. StorageStack no longer exports any values
      # imported by LambdaStack (buckets are resolved via fromBucketName inside
      # LambdaStack), so StorageStack can be updated freely at any time.
      - name: Deploy storage stack
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          cd cdk
          npx cdk deploy "ComplAIStorageStack-${TARGET_ENV}" \
            --require-approval never

      # Upload the fat JAR to the deployments bucket with a key that includes the
      # short git SHA. The unique key is what tells CloudFormation "code changed,
      # update the Lambda function" — without it, a same-key re-upload would be
      # invisible to CloudFormation and the Lambda would not be updated.
      - name: Upload JAR to deployments bucket
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          # Bash glob expansion — no dependency on PATH-resolved 'ls' or 'head'.
          CANDIDATE=""
          for f in build/libs/*-all.jar; do [[ -f "$f" ]] && CANDIDATE="$f" && break; done
          if [[ -z "$CANDIDATE" ]]; then
            for f in build/libs/*.jar; do [[ -f "$f" ]] && CANDIDATE="$f" && break; done
          fi
          if [[ -z "$CANDIDATE" ]]; then
            echo "ERROR: No usable JAR found in build/libs." >&2
            exit 1
          fi
          JAR_KEY="complai-all-${GITHUB_SHA::8}.jar"
          aws s3 cp "$CANDIDATE" "s3://complai-deployments-${TARGET_ENV}/${JAR_KEY}"
          echo "Uploaded $(basename "$CANDIDATE") → s3://complai-deployments-${TARGET_ENV}/${JAR_KEY}"
          # Make the key available to the CDK deploy step via the job environment.
          echo "DEPLOYMENT_JAR_KEY=${JAR_KEY}" >> "$GITHUB_ENV"

      # Deploy the Lambda stack. CDK CLI respects addDependency and deploys
      # QueueStack first if it has pending changes. StorageStack is a no-op here
      # (already deployed above). The JAR is read from S3 via Code.fromBucket()
      # using DEPLOYMENT_JAR_KEY — nothing is staged to the CDK bootstrap bucket.
      - name: Deploy Lambda stack
        env:
          # Required secrets/vars ------------------------------------------------
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TARGET_ENV: ${{ steps.target.outputs.environment }}
          # DEPLOYMENT_JAR_KEY is written to $GITHUB_ENV in the Upload JAR step.
          # Re-expose it explicitly here so the step contract is obvious.
          DEPLOYMENT_JAR_KEY: ${{ env.DEPLOYMENT_JAR_KEY }}

          # Optional tuning variables (set these as repository/organization
          # Variables or Environment-level Variables in GitHub if you want to
          # override the code defaults in lambda-stack.ts). Leave unset to use
          # the sensible defaults defined in the CDK code.
          OPENROUTER_REQUEST_TIMEOUT_SECONDS: ${{ vars.OPENROUTER_REQUEST_TIMEOUT_SECONDS }}
          OPENROUTER_OVERALL_TIMEOUT_SECONDS: ${{ vars.OPENROUTER_OVERALL_TIMEOUT_SECONDS }}
          OPENROUTER_MAX_RETRIES: ${{ vars.OPENROUTER_MAX_RETRIES }}
          HTTP_CLIENT_CONNECT_TIMEOUT: ${{ vars.HTTP_CLIENT_CONNECT_TIMEOUT }}
          HTTP_CLIENT_READ_TIMEOUT: ${{ vars.HTTP_CLIENT_READ_TIMEOUT }}
          HTTP_CLIENT_MAX_CONNECTIONS: ${{ vars.HTTP_CLIENT_MAX_CONNECTIONS }}
          HTTP_CLIENT_LOG_LEVEL: ${{ vars.HTTP_CLIENT_LOG_LEVEL }}
        run: |
          cd cdk
          npx cdk deploy "ComplAILambdaStack-${TARGET_ENV}" \
            --require-approval never \
            --outputs-file "../cdk-outputs-${TARGET_ENV}.json"

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v7
        with:
          name: cdk-outputs-${{ steps.target.outputs.environment }}
          path: cdk-outputs-${{ steps.target.outputs.environment }}.json

  # ---------------------------------------------------------------------------
  # E2E: Run Bruno E2E tests after successful deploy to development
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E API Tests (Bruno)
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && needs.deploy.result == 'success' && needs.deploy.outputs.environment == 'development'
    runs-on: ubuntu-latest
    continue-on-error: true   # E2E job never fails the workflow
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # FIX 2: Set up Java to run the TokenGenerator
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # FIX 3: Download the already built JAR instead of running Gradle again
      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: lambda-jar
          path: build/libs

      - name: Install Bruno CLI
        # npm spawns postinstall scripts via a bare 'sh' name, which fails on this
        # runner when PATH lookup doesn't resolve it. Setting script-shell to the
        # explicit path fixes the spawn ENOENT error regardless of which package
        # triggers a postinstall. The version is pinned because older Bruno CLI
        # releases pulled in protobufjs (which has its own postinstall) while
        # 3.1.3+ does not.
        run: |
          npm config set script-shell /bin/sh
          npm install -g @usebruno/cli@3.1.3

      - name: Generate JWT token for Bruno E2E
        run: |
          # Use $JAVA_HOME/bin/java and bash built-ins exclusively.
          # If a GitHub Environment Variable named PATH is accidentally present it
          # will shadow the system $PATH for every step in the job, making 'java',
          # 'head', 'tail', and 'ls' all unfindable. Bypassing PATH lookup entirely
          # avoids that whole class of failure.

          # Bash glob expansion — no 'ls' or 'head' needed.
          CANDIDATE=""
          for f in build/libs/*-all.jar; do [[ -f "$f" ]] && CANDIDATE="$f" && break; done
          if [[ -z "$CANDIDATE" ]]; then
            for f in build/libs/*.jar; do [[ -f "$f" ]] && CANDIDATE="$f" && break; done
          fi
          if [[ -z "$CANDIDATE" ]]; then
            echo "ERROR: No JAR found in build/libs." >&2
            exit 1
          fi

          # Read the last non-empty output line without relying on 'tail'.
          TOKEN=""
          while IFS= read -r line; do
            [[ -n "$line" ]] && TOKEN="$line"
          done < <(JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                   "$JAVA_HOME/bin/java" -cp "$CANDIDATE" \
                   cat.complai.auth.TokenGenerator e2e-development 1 elprat 2>/dev/null)
          echo "jwtToken=$TOKEN" >> "$GITHUB_ENV"

      - name: Run Bruno E2E tests (development)
        working-directory: ./E2E-ComplAI
        env:
          jwtToken: ${{ env.jwtToken }}
          # path is a vars:secret in Development.bru so Bruno CLI requires it to
          # be injected at runtime — it is never stored in the .bru file.
          # We use COMPLAI_BASE_URL as the env var name to avoid shadowing the
          # system $PATH variable, then map it to the Bruno variable name 'path'
          # via --env-var. The GitHub secret must be named COMPLAI_BASE_URL
          # (not PATH — a secret named PATH would not auto-inject, but a GitHub
          # Environment *variable* named PATH would shadow $PATH for the whole job).
          COMPLAI_BASE_URL: ${{ secrets.COMPLAI_BASE_URL }}
        run: >
          bru run . -r --env Development
          --env-var jwtToken="$jwtToken"
          --env-var path="$COMPLAI_BASE_URL"
          --reporter-json report/results.json
        continue-on-error: true

      - name: Upload Bruno E2E JSON report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bruno-e2e-json-report
          path: ./E2E-ComplAI/report/results.json
