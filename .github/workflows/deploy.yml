# Workflow for building the Micronaut GraalVM native image and deploying via AWS CDK.
#
# Triggers:
#   - Manual (workflow_dispatch): choose environment (development | production) and branch.
#     Deploying to production is only allowed from the master branch; the guard job
#     enforces this before anything else runs.
#   - Automatic (pull_request): any PR opened/updated/reopened deploys to development only.
#     Production is never touched automatically.
#
# Environments:
#   - development: no approval required, uses secrets.OPENROUTER_API_KEY from the
#                  "development" GitHub Environment.
#   - production:  requires manual approval (configure a required reviewer in
#                  Settings → Environments → production), uses secrets.OPENROUTER_API_KEY
#                  from the "production" GitHub Environment.
#
# Required IAM Permissions:
#   The github-cdk-deploy-role must have the following permissions:
#   - S3: s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket, s3:GetBucketLocation
#   - CloudFormation: cloudformation:DescribeStacks, cloudformation:CreateStack, etc.
#   - Lambda: lambda:GetFunction, lambda:CreateFunction, lambda:UpdateFunctionCode, etc.
#   - IAM: iam:PassRole (for Lambda execution roles)
#   - CloudFront: cloudfront:GetDistribution, cloudfront:CreateDistribution (production only)
#   - WAF: wafv2:GetWebACL, wafv2:CreateWebACL (production only)
#   See cdk/iam/github-cdk-deploy-role-policy.json for the full policy.
name: Build & Deploy to AWS CDK

# Grant the workflow permission to request OIDC id-tokens and read repository contents.
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'
      branch:
        description: 'Branch to deploy (production only accepts master)'
        required: true
        default: 'master'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ---------------------------------------------------------------------------
  # Guard: fail fast when a manual dispatch tries to deploy production from a
  # branch other than master. This is the only place this rule is enforced, so
  # it is explicit and visible in the job list.
  # ---------------------------------------------------------------------------
  guard:
    name: Validate deployment inputs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Block production deploy from non-master branch
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.environment == 'production' &&
          inputs.branch != 'master'
        run: |
          echo "ERROR: Production can only be deployed from master. Got branch: '${{ inputs.branch }}'." >&2
          exit 1

      - name: Confirm deployment target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Automatic PR trigger → deploying to: development"
          else
            echo "Manual trigger → deploying to: ${{ inputs.environment }} from branch: ${{ inputs.branch }}"
          fi

  # ---------------------------------------------------------------------------
  # Build: compile the project and build the GraalVM native image, then upload it as an artifact.
  # ---------------------------------------------------------------------------
  build:
    name: Build Native Image
    needs: [guard]
    # ARM64 runner required — GraalVM native-image cannot cross-compile under
    # QEMU emulation (binary syscall-heavy process fails with exit code 126).
    # The runner natively executes ARM64 Docker containers for buildNativeLambda.
    runs-on: ubuntu-24.04-arm
    # guard only runs on workflow_dispatch; on pull_request it is skipped.
    # A skipped dependency would block this job, so we explicitly allow both
    # "success" (manual dispatch that passed guard) and "skipped" (PR trigger).
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For manual dispatches, check out the requested branch.
          # For PRs, the default checkout (merge commit) is correct.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Verify branch exists
        # Only relevant for manual dispatches. Provides a clear error message if the
        # branch input is mistyped, instead of letting a later step fail cryptically.
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git show-ref --verify --quiet "refs/remotes/origin/${{ inputs.branch }}"; then
            echo "ERROR: Branch '${{ inputs.branch }}' does not exist in the repository." >&2
            exit 1
          fi
          echo "Branch '${{ inputs.branch }}' verified."

      - name: Set up JDK 25 (needed for JVM compilation before native image)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run CI tests
        # Fail early if any test fails, before building the deployable artifact.
        run: ./gradlew --no-daemon ciTest

      - name: Build GraalVM native image
        run: ./gradlew --no-daemon clean buildNativeLambda

      - name: Upload native image artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-native-zip
          path: build/libs/*.zip

  # ---------------------------------------------------------------------------
  # Deploy: download the native ZIP and deploy the correct CDK stack for the target
  # environment. The GitHub Environment binding is what gates production behind
  # a required manual approval (configured in Settings → Environments).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      # Bind to the matching GitHub Environment so that:
      #   - development: deploys immediately (no approval required).
      #   - production:  waits for a required reviewer to approve
      #                  (configure in Settings → Environments → production).
      # Each environment holds its own OPENROUTER_API_KEY secret.
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    outputs:
      environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Resolve deployment target
        id: target
        # Produce a single output used throughout this job to avoid repeating the ternary.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Download native image artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-native-zip
          path: build/libs

      - name: Verify native image artifact exists
        run: |
          echo "Checking for build/libs/*.zip artifacts..."
          if ! ls build/libs/*.zip 1>/dev/null 2>&1; then
            echo "ERROR: No native image ZIP found in build/libs. Ensure the build job produced an artifact." >&2
            exit 1
          fi
          echo "Found artifacts:"
          ls -1 build/libs/*.zip

      - name: Verify OPENROUTER_API_KEY is set
        # Do NOT print the key value. Only log that it is present and its length.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "ERROR: OPENROUTER_API_KEY secret is not set for the '${{ steps.target.outputs.environment }}' environment." >&2
            exit 1
          fi
          LEN=$(echo -n "$OPENROUTER_API_KEY" | wc -c | tr -d ' ')
          echo "OPENROUTER_API_KEY is set (length: $LEN, value: [REDACTED])."

      - name: Verify OPENROUTER_MODEL is set
        env:
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
        run: |
          if [ -z "$OPENROUTER_MODEL" ]; then
            echo "ERROR: OPENROUTER_MODEL variable is not set for the '${{ steps.target.outputs.environment }}' environment." >&2
            exit 1
          fi
          echo "OPENROUTER_MODEL is set (value: [REDACTED])."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: ${{ vars.PROCEDURES_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Pre-flight permission check
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          echo "Running pre-flight permission checks for deployment..."
          
          PERMISSIONS_OK=true
          
          # Test S3 permissions (needed for uploading native ZIP)
          if ! aws s3api list-buckets --query "Buckets[?starts_with(Name, 'complai-')].Name" --output text > /dev/null 2>&1; then
            echo "ERROR: Cannot list S3 buckets. Deployment will fail."
            echo "Ensure the IAM role has s3:ListBucket permission."
            PERMISSIONS_OK=false
          fi
          
          # Test S3 write permissions (needed for uploading to deployments bucket)
          if ! aws s3api head-bucket --bucket "complai-deployments-${TARGET_ENV}" 2>/dev/null; then
            echo "WARNING: Cannot access deployments bucket. This may be expected if this is the first deployment."
          fi
          
          # Test CloudFormation permissions (needed for CDK deploy)
          if ! aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE --query "StackSummaries[?starts_with(StackName, 'ComplAI')].StackName" --output text > /dev/null 2>&1; then
            echo "ERROR: Cannot list CloudFormation stacks. CDK deploy will fail."
            echo "Ensure the IAM role has cloudformation:ListStacks permission."
            PERMISSIONS_OK=false
          fi
          
          # Test Lambda permissions (needed for updating Lambda functions)
          if ! aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'ComplAI')].FunctionName" --output text > /dev/null 2>&1; then
            echo "ERROR: Cannot list Lambda functions. CDK deploy may fail."
            echo "Ensure the IAM role has lambda:ListFunctions permission."
            PERMISSIONS_OK=false
          fi
          
          # Test IAM PassRole permissions (needed for Lambda execution roles)
          if ! aws iam list-roles --query "Roles[?starts_with(RoleName, 'ComplAI')].RoleName" --output text > /dev/null 2>&1; then
            echo "WARNING: Cannot list IAM roles. CDK deploy may fail if PassRole is needed."
          fi
          
          # Test CloudFront permissions (production only)
          if [ "${TARGET_ENV}" = "production" ]; then
            if ! aws cloudfront list-distributions --query "DistributionList.Items[].Id" --output text > /dev/null 2>&1; then
              echo "ERROR: Cannot list CloudFront distributions. Edge stack deploy will fail."
              echo "Ensure the IAM role has cloudfront:ListDistributions permission."
              PERMISSIONS_OK=false
            fi
          fi
          
          if [ "${PERMISSIONS_OK}" = "false" ]; then
            echo ""
            echo "=========================================="
            echo "PERMISSIONS ERROR DETECTED"
            echo "=========================================="
            echo "The IAM role 'github-cdk-deploy-role' is missing required permissions."
            echo ""
            echo "See cdk/iam/github-cdk-deploy-role-policy.json for the full policy."
            echo "=========================================="
            exit 1
          fi
          
          echo "Pre-flight permission checks passed."

      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm for CDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/npm
          key: ${{ runner.os }}-node-${{ hashFiles('cdk/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        run: cd cdk && npm install

      - name: Build CDK TypeScript
        run: cd cdk && npm run build

      - name: Validate CDK installation
        run: |
          node -v
          npm -v
          echo "CDK (global) version:" && npx cdk --version || true

      # Deploy StorageStack first so the complai-deployments-<env> bucket exists
      # before we try to upload the native image ZIP. StorageStack no longer exports any values
      # imported by LambdaStack (buckets are resolved via fromBucketName inside
      # LambdaStack), so StorageStack can be updated freely at any time.
      - name: Deploy storage stack
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          cd cdk
          if ! npx cdk deploy "ComplAIStorageStack-${TARGET_ENV}" \
            --require-approval never; then
            echo ""
            echo "=========================================="
            echo "CDK DEPLOY FAILED: StorageStack"
            echo "=========================================="
            echo "Failed to deploy ComplAIStorageStack-${TARGET_ENV}"
            echo ""
            echo "Possible causes:"
            echo "  1. Missing CloudFormation permissions"
            echo "  2. S3 bucket already exists with different configuration"
            echo "  3. IAM role cannot pass required roles"
            echo ""
            echo "Check CloudFormation console for detailed error messages."
            echo "=========================================="
            exit 1
          fi

      # Upload the native image ZIP to the deployments bucket with a key that includes the
      # short git SHA. The unique key is what tells CloudFormation "code changed,
      # update the Lambda function" — without it, a same-key re-upload would be
      # invisible to CloudFormation and the Lambda would not be updated.
      - name: Upload native image ZIP to deployments bucket
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          # Bash glob expansion — no dependency on PATH-resolved 'ls' or 'head'.
          CANDIDATE=""
          for f in build/libs/*.zip; do [[ -f "$f" ]] && CANDIDATE="$f" && break; done
          if [[ -z "$CANDIDATE" ]]; then
            echo "ERROR: No usable native image ZIP found in build/libs." >&2
            exit 1
          fi
          JAR_KEY="complai-all-${GITHUB_SHA::8}.zip"
          
          # Upload with error handling
          if ! aws s3 cp "$CANDIDATE" "s3://complai-deployments-${TARGET_ENV}/${JAR_KEY}"; then
            echo ""
            echo "=========================================="
            echo "S3 UPLOAD FAILED"
            echo "=========================================="
            echo "Failed to upload native image to s3://complai-deployments-${TARGET_ENV}/${JAR_KEY}"
            echo ""
            echo "Possible causes:"
            echo "  1. The deployments bucket does not exist (first deployment?)"
            echo "  2. Missing S3 permissions: s3:PutObject on arn:aws:s3:::complai-deployments-*/*"
            echo "  3. Bucket policy restrictions"
            echo ""
            echo "Required IAM permissions:"
            echo "  - s3:PutObject on arn:aws:s3:::complai-deployments-*/*"
            echo "  - s3:GetBucketLocation on arn:aws:s3:::complai-deployments-*"
            echo "=========================================="
            exit 1
          fi
          
          echo "Uploaded $(basename "$CANDIDATE") → s3://complai-deployments-${TARGET_ENV}/${JAR_KEY}"
          # Make the key available to the CDK deploy step via the job environment.
          echo "DEPLOYMENT_JAR_KEY=${JAR_KEY}" >> "$GITHUB_ENV"

      # Deploy the Lambda stack. CDK CLI respects addDependency and deploys
      # QueueStack first if it has pending changes. StorageStack is a no-op here
      # (already deployed above). The native ZIP is read from S3 via Code.fromBucket()
      # using DEPLOYMENT_JAR_KEY — nothing is staged to the CDK bootstrap bucket.
      - name: Deploy Lambda stack
        env:
          # Required secrets/vars ------------------------------------------------
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          API_KEY_ELPRAT: ${{ secrets.API_KEY_ELPRAT }}
          # Per-city enable/disable feature flags — set to "true" in GitHub Environment Variables to enable a city
          ENABLE_CITY_ELPRAT: ${{ vars.ENABLE_CITY_ELPRAT }}
          # Telegram Bot — per-city token and webhook secret
          TOKEN_TELEGRAM_ELPRAT: ${{ secrets.TOKEN_TELEGRAM_ELPRAT }}
          TELEGRAM_WEBHOOK_SECRET_ELPRAT: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_ELPRAT }}
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          SES_TO_EMAIL_ELPRAT: ${{ vars.SES_TO_EMAIL_ELPRAT }}
          TARGET_ENV: ${{ steps.target.outputs.environment }}
          # DEPLOYMENT_JAR_KEY is written to $GITHUB_ENV in the Upload native image ZIP step.
          # Re-expose it explicitly here so the step contract is obvious.
          DEPLOYMENT_JAR_KEY: ${{ env.DEPLOYMENT_JAR_KEY }}

          # Optional tuning variables (set these as repository/organization
          # Variables or Environment-level Variables in GitHub if you want to
          # override the code defaults in lambda-stack.ts). Leave unset to use
          # the sensible defaults defined in the CDK code.
          OPENROUTER_REQUEST_TIMEOUT_SECONDS: ${{ vars.OPENROUTER_REQUEST_TIMEOUT_SECONDS }}
          OPENROUTER_OVERALL_TIMEOUT_SECONDS: ${{ vars.OPENROUTER_OVERALL_TIMEOUT_SECONDS }}
          OPENROUTER_MAX_RETRIES: ${{ vars.OPENROUTER_MAX_RETRIES }}
          HTTP_CLIENT_CONNECT_TIMEOUT: ${{ vars.HTTP_CLIENT_CONNECT_TIMEOUT }}
          HTTP_CLIENT_READ_TIMEOUT: ${{ vars.HTTP_CLIENT_READ_TIMEOUT }}
          HTTP_CLIENT_MAX_CONNECTIONS: ${{ vars.HTTP_CLIENT_MAX_CONNECTIONS }}
          HTTP_CLIENT_LOG_LEVEL: ${{ vars.HTTP_CLIENT_LOG_LEVEL }}
          RESPONSE_CACHE_ENABLED: ${{ vars.RESPONSE_CACHE_ENABLED }}
          RESPONSE_CACHE_TTL_MINUTES: ${{ vars.RESPONSE_CACHE_TTL_MINUTES }}
          RESPONSE_CACHE_MAX_ENTRIES: ${{ vars.RESPONSE_CACHE_MAX_ENTRIES }}
          # In the "Deploy Lambda stack" section, add:
          RATE_LIMIT_REQUESTS_PER_MINUTE: ${{ vars.RATE_LIMIT_REQUESTS_PER_MINUTE }}
          # Telegram spam protection (optional overrides — defaults apply if unset)
          TELEGRAM_CHAT_RATE_LIMIT_PER_SECOND: ${{ vars.TELEGRAM_CHAT_RATE_LIMIT_PER_SECOND }}
          TELEGRAM_BOT_RATE_LIMIT_PER_SECOND: ${{ vars.TELEGRAM_BOT_RATE_LIMIT_PER_SECOND }}
          TELEGRAM_MAX_MESSAGE_LENGTH: ${{ vars.TELEGRAM_MAX_MESSAGE_LENGTH }}
          # SQS queue depth cap (optional override — default applies if unset)
          SQS_MAX_QUEUE_DEPTH: ${{ vars.SQS_MAX_QUEUE_DEPTH }}
          FEEDBACK_MAX_MESSAGE_LENGTH: ${{ vars.FEEDBACK_MAX_MESSAGE_LENGTH }}
          FEEDBACK_MAX_USERNAME_LENGTH: ${{ vars.FEEDBACK_MAX_USERNAME_LENGTH }}
        run: |
          cd cdk
          if ! npx cdk deploy "ComplAILambdaStack-${TARGET_ENV}" \
            --require-approval never \
            --outputs-file "../cdk-outputs-${TARGET_ENV}.json"; then
            echo ""
            echo "=========================================="
            echo "CDK DEPLOY FAILED: LambdaStack"
            echo "=========================================="
            echo "Failed to deploy ComplAILambdaStack-${TARGET_ENV}"
            echo ""
            echo "Possible causes:"
            echo "  1. Missing CloudFormation permissions"
            echo "  2. Lambda function already exists with different configuration"
            echo "  3. IAM role cannot pass Lambda execution roles"
            echo "  4. Missing secrets (OPENROUTER_API_KEY, API_KEY_*, TELEGRAM_*)"
            echo ""
            echo "Check CloudFormation console for detailed error messages."
            echo "=========================================="
            exit 1
          fi

      - name: Deploy Edge stack (CloudFront + WAF)
        if: steps.target.outputs.environment == 'production'
        env:
          TARGET_ENV: ${{ steps.target.outputs.environment }}
        run: |
          cd cdk
          if ! npx cdk deploy "ComplAIEdgeStack-${TARGET_ENV}" \
            --require-approval never \
            --exclusively; then
            echo ""
            echo "=========================================="
            echo "CDK DEPLOY FAILED: EdgeStack"
            echo "=========================================="
            echo "Failed to deploy ComplAIEdgeStack-${TARGET_ENV}"
            echo ""
            echo "Possible causes:"
            echo "  1. Missing CloudFormation permissions"
            echo "  2. CloudFront distribution already exists"
            echo "  3. WAF WebACL already exists"
            echo "  4. Missing CloudFront/WAF permissions"
            echo ""
            echo "Note: EdgeStack must be deployed in us-east-1 region."
            echo "Check CloudFormation console in us-east-1 for detailed error messages."
            echo "=========================================="
            exit 1
          fi

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-${{ steps.target.outputs.environment }}
          path: cdk-outputs-${{ steps.target.outputs.environment }}.json

  # ---------------------------------------------------------------------------
  # E2E: Run Bruno E2E tests after successful deploy to development
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E API Tests (Bruno)
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && needs.deploy.result == 'success' && needs.deploy.outputs.environment == 'development'
    runs-on: ubuntu-latest
    continue-on-error: true   # E2E job never fails the workflow
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        # npm spawns postinstall scripts via a bare 'sh' name, which fails on this
        # runner when PATH lookup doesn't resolve it. Setting script-shell to the
        # explicit path fixes the spawn ENOENT error regardless of which package
        # triggers a postinstall. The version is pinned because older Bruno CLI
        # releases pulled in protobufjs (which has its own postinstall) while
        # 3.1.3+ does not.
        run: |
          npm config set script-shell /bin/sh
          npm install -g @usebruno/cli@3.1.3

      - name: Export API key for Bruno E2E
        run: |
          echo "apiKey=${{ secrets.API_KEY_ELPRAT }}" >> "$GITHUB_ENV"

      - name: Run Bruno E2E tests (development)
        working-directory: ./E2E-ComplAI
        env:
          apiKey: ${{ env.apiKey }}
          COMPLAI_BASE_URL: ${{ secrets.COMPLAI_BASE_URL }}
        run: >
          bru run . -r --env Development
          --env-var apiKey="$apiKey"
          --env-var path="$COMPLAI_BASE_URL"
          --reporter-json report/results.json
        continue-on-error: true

      - name: Upload Bruno E2E JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-e2e-json-report
          path: ./E2E-ComplAI/report/results.json
