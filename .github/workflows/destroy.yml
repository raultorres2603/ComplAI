# Workflow for destroying all AWS resources for a selected environment.
#
# Triggers:
#   - Manual (workflow_dispatch) ONLY. Never triggered automatically.
#
# Safety gates:
#   1. The user must type the environment name exactly in the `confirm` input.
#   2. For production, the GitHub Environment "production" requires a manual
#      approval from a configured reviewer before the destroy job runs.
#
# Destroy order (reverse dependency order):
#   1. ComplAIEdgeStack-<env>   (production only, us-east-1)
#   2. ComplAILambdaStack-<env>
#   3. ComplAIQueueStack-<env>
#   4. ComplAIStorageStack-<env>
#
# Resource cleanup (after CDK destroy):
#   CDK destroy leaves behind resources with RETAIN removal policy:
#   - S3 buckets: procedures, events, news, cityinfo, deployments, complaints, feedback
#   - CloudWatch Log Groups: All Lambda function log groups
#   - SQS queues (production only): redact, redact-dlq, feedback, feedback-dlq, ask, ask-dlq
#   These are explicitly deleted to ensure complete environment cleanup.
name: Destroy All Environment Resources

# Grant the workflow permission to request OIDC id-tokens and read repository contents.
permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to destroy'
        required: true
        type: choice
        options:
          - development
          - production
      confirm:
        description: 'Type the environment name exactly to confirm destruction (e.g. production)'
        required: true
        type: string

jobs:
  # ---------------------------------------------------------------------------
  # Guard: validate the confirmation input before anything irreversible happens.
  # ---------------------------------------------------------------------------
  guard:
    name: Validate destruction inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation matches environment
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "ERROR: Confirmation '${{ inputs.confirm }}' does not match environment '${{ inputs.environment }}'." >&2
            echo "You must type the environment name exactly to confirm destruction." >&2
            exit 1
          fi
          echo "WARNING: You are about to DESTROY all CDK stacks for '${{ inputs.environment }}'."
          echo "This action is IRREVERSIBLE. Proceeding..."

  # ---------------------------------------------------------------------------
  # Destroy: tear down CDK stacks in reverse dependency order.
  # Bound to the GitHub Environment so that production requires a manual approval
  # (configure a required reviewer in Settings → Environments → production).
  # ---------------------------------------------------------------------------
  destroy:
    name: Destroy ${{ inputs.environment }} stacks
    needs: guard
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::134267836527:role/github-cdk-deploy-role
          aws-region: eu-west-1
          audience: sts.amazonaws.com
          output-env-credentials: true

      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        run: cd cdk && npm install

      - name: Build CDK TypeScript
        run: cd cdk && npm run build

      # Destroy EdgeStack first (production only). This stack lives in us-east-1.
      # --exclusively prevents CDK from attempting to destroy dependency stacks
      # a second time when they are processed in subsequent steps.
      - name: Destroy edge stack (production only)
        if: inputs.environment == 'production'
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          cd cdk
          npx cdk destroy "ComplAIEdgeStack-${TARGET_ENV}" --force --exclusively

      - name: Destroy lambda stack
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          cd cdk
          npx cdk destroy "ComplAILambdaStack-${TARGET_ENV}" --force

      - name: Destroy queue stack
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          cd cdk
          npx cdk destroy "ComplAIQueueStack-${TARGET_ENV}" --force

      - name: Destroy storage stack
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          cd cdk
          npx cdk destroy "ComplAIStorageStack-${TARGET_ENV}" --force

      # ---------------------------------------------------------------------------
      # Resource cleanup: Delete resources with RETAIN removal policy.
      # CDK destroy does not remove these resources. We use AWS CLI to clean them up.
      # Error handling: continue cleanup even if individual deletions fail.
      #
      # IMPORTANT: The github-cdk-deploy-role IAM role must have the following
      # permissions for complete cleanup:
      #   - s3:DeleteObject, s3:DeleteBucket, s3:ListBucket, s3:GetBucketLocation
      #   - sqs:DeleteQueue, sqs:GetQueueUrl, sqs:GetQueueAttributes
      #   - logs:DeleteLogGroup, logs:DescribeLogGroups
      # See cdk/iam/github-cdk-deploy-role-policy.json for the full policy.
      # ---------------------------------------------------------------------------

      - name: Pre-flight permission check
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "Running pre-flight permission checks..."
          
          # Test S3 permissions
          if ! aws s3api list-buckets --query "Buckets[?starts_with(Name, 'complai-')].Name" --output text > /dev/null 2>&1; then
            echo "WARNING: Cannot list S3 buckets. Cleanup may fail."
            echo "Ensure the IAM role has s3:ListBucket permission."
          fi
          
          # Test SQS permissions (production only)
          if [ "${TARGET_ENV}" = "production" ]; then
            if ! aws sqs list-queues --queue-name-prefix "complai-" > /dev/null 2>&1; then
              echo "WARNING: Cannot list SQS queues. Queue cleanup may fail."
              echo "Ensure the IAM role has sqs:ListQueues permission."
            fi
          fi
          
          # Test CloudWatch Logs permissions
          if ! aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/ComplAI-" --query "logGroups[].logGroupName" --output text > /dev/null 2>&1; then
            echo "WARNING: Cannot describe CloudWatch Log Groups. Log group cleanup may fail."
            echo "Ensure the IAM role has logs:DescribeLogGroups permission."
          fi
          
          echo "Pre-flight checks completed."

      - name: Delete retained S3 buckets
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "Deleting RETAIN'd S3 buckets for environment: ${TARGET_ENV}"
          echo ""
          echo "Note: If you see AccessDenied errors, ensure the IAM role has:"
          echo "  - s3:DeleteObject on arn:aws:s3:::complai-*/*"
          echo "  - s3:DeleteBucket on arn:aws:s3:::complai-*"
          echo ""
          
          # List of all S3 buckets that have RETAIN removal policy
          BUCKETS=(
            "complai-procedures-${TARGET_ENV}"
            "complai-events-${TARGET_ENV}"
            "complai-news-${TARGET_ENV}"
            "complai-cityinfo-${TARGET_ENV}"
            "complai-deployments-${TARGET_ENV}"
            "complai-complaints-${TARGET_ENV}"
            "complai-feedback-${TARGET_ENV}"
          )
          
          PERMISSIONS_ISSUE=false
          
          for BUCKET in "${BUCKETS[@]}"; do
            echo "Processing bucket: ${BUCKET}"
            
            # Check if bucket exists
            if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
              echo "  Bucket exists, emptying and deleting..."
              
              # Empty the bucket (required before deletion)
              if ! aws s3 rm "s3://${BUCKET}" --recursive 2>&1; then
                echo "  WARNING: Failed to empty bucket ${BUCKET}"
                if aws s3 rm "s3://${BUCKET}" --recursive 2>&1 | grep -q "AccessDenied"; then
                  PERMISSIONS_ISSUE=true
                fi
                continue
              fi
              
              # Delete the bucket
              if ! aws s3 rb "s3://${BUCKET}" 2>&1; then
                echo "  WARNING: Failed to delete bucket ${BUCKET}"
                if aws s3 rb "s3://${BUCKET}" 2>&1 | grep -q "AccessDenied"; then
                  PERMISSIONS_ISSUE=true
                fi
                continue
              fi
              
              echo "  Successfully deleted bucket: ${BUCKET}"
            else
              echo "  Bucket ${BUCKET} does not exist, skipping..."
            fi
          done
          
          if [ "${PERMISSIONS_ISSUE}" = "true" ]; then
            echo ""
            echo "=========================================="
            echo "PERMISSIONS ERROR DETECTED"
            echo "=========================================="
            echo "The IAM role 'github-cdk-deploy-role' is missing S3 permissions."
            echo ""
            echo "Required permissions:"
            echo "  - s3:DeleteObject on arn:aws:s3:::complai-*/*"
            echo "  - s3:DeleteBucket on arn:aws:s3:::complai-*"
            echo ""
            echo "See cdk/iam/github-cdk-deploy-role-policy.json for the full policy."
            echo "=========================================="
            exit 1
          fi

      - name: Delete retained SQS queues (production only)
        if: inputs.environment == 'production'
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "Deleting RETAIN'd SQS queues for environment: ${TARGET_ENV}"
          echo ""
          echo "Note: If you see AccessDenied errors, ensure the IAM role has:"
          echo "  - sqs:DeleteQueue on arn:aws:sqs:eu-west-1:134267836527:complai-*"
          echo "  - sqs:GetQueueUrl on arn:aws:sqs:eu-west-1:134267836527:complai-*"
          echo ""
          
          # List of SQS queues that have RETAIN removal policy in production
          QUEUES=(
            "complai-redact-${TARGET_ENV}"
            "complai-redact-dlq-${TARGET_ENV}"
            "complai-feedback-${TARGET_ENV}"
            "complai-feedback-dlq-${TARGET_ENV}"
            "complai-ask-${TARGET_ENV}"
            "complai-ask-dlq-${TARGET_ENV}"
          )
          
          PERMISSIONS_ISSUE=false
          
          for QUEUE in "${QUEUES[@]}"; do
            echo "Processing queue: ${QUEUE}"
            
            # Get queue URL (will fail if queue doesn't exist)
            QUEUE_URL=$(aws sqs get-queue-url --queue-name "${QUEUE}" --query QueueUrl --output text 2>/dev/null) || {
              echo "  Queue ${QUEUE} does not exist, skipping..."
              continue
            }
            
            # Delete the queue
            if ! aws sqs delete-queue --queue-url "${QUEUE_URL}" 2>&1; then
              echo "  WARNING: Failed to delete queue ${QUEUE}"
              if aws sqs delete-queue --queue-url "${QUEUE_URL}" 2>&1 | grep -q "AccessDenied"; then
                PERMISSIONS_ISSUE=true
              fi
              continue
            fi
            
            echo "  Successfully deleted queue: ${QUEUE}"
          done
          
          if [ "${PERMISSIONS_ISSUE}" = "true" ]; then
            echo ""
            echo "=========================================="
            echo "PERMISSIONS ERROR DETECTED"
            echo "=========================================="
            echo "The IAM role 'github-cdk-deploy-role' is missing SQS permissions."
            echo ""
            echo "Required permissions:"
            echo "  - sqs:DeleteQueue on arn:aws:sqs:eu-west-1:134267836527:complai-*"
            echo "  - sqs:GetQueueUrl on arn:aws:sqs:eu-west-1:134267836527:complai-*"
            echo ""
            echo "See cdk/iam/github-cdk-deploy-role-policy.json for the full policy."
            echo "=========================================="
            exit 1
          fi

      - name: Delete retained CloudWatch Log Groups
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "Deleting RETAIN'd CloudWatch Log Groups for environment: ${TARGET_ENV}"
          echo ""
          echo "Note: If you see AccessDenied errors, ensure the IAM role has:"
          echo "  - logs:DeleteLogGroup on arn:aws:logs:eu-west-1:134267836527:log-group:/aws/lambda/ComplAI-*"
          echo ""
          
          # List of CloudWatch Log Groups that have RETAIN removal policy
          LOG_GROUPS=(
            "/aws/lambda/ComplAILambda-${TARGET_ENV}"
            "/aws/lambda/ComplAIRedactorLambda-${TARGET_ENV}"
            "/aws/lambda/ComplAIFeedbackWorkerLambda-${TARGET_ENV}"
            "/aws/lambda/ComplAIAskWorkerLambda-${TARGET_ENV}"
            "/aws/lambda/ComplAIScheduledReportLambda-${TARGET_ENV}"
          )
          
          PERMISSIONS_ISSUE=false
          
          for LOG_GROUP in "${LOG_GROUPS[@]}"; do
            echo "Processing log group: ${LOG_GROUP}"
            
            # Check if log group exists
            if aws logs describe-log-groups --log-group-name-prefix "${LOG_GROUP}" --query "logGroups[?logGroupName=='${LOG_GROUP}']" --output text | grep -q "${LOG_GROUP}"; then
              echo "  Log group exists, deleting..."
              
              # Delete the log group
              if ! aws logs delete-log-group --log-group-name "${LOG_GROUP}" 2>&1; then
                echo "  WARNING: Failed to delete log group ${LOG_GROUP}"
                if aws logs delete-log-group --log-group-name "${LOG_GROUP}" 2>&1 | grep -q "AccessDenied"; then
                  PERMISSIONS_ISSUE=true
                fi
                continue
              fi
              
              echo "  Successfully deleted log group: ${LOG_GROUP}"
            else
              echo "  Log group ${LOG_GROUP} does not exist, skipping..."
            fi
          done
          
          if [ "${PERMISSIONS_ISSUE}" = "true" ]; then
            echo ""
            echo "=========================================="
            echo "PERMISSIONS ERROR DETECTED"
            echo "=========================================="
            echo "The IAM role 'github-cdk-deploy-role' is missing CloudWatch Logs permissions."
            echo ""
            echo "Required permissions:"
            echo "  - logs:DeleteLogGroup on arn:aws:logs:eu-west-1:134267836527:log-group:/aws/lambda/ComplAI-*"
            echo ""
            echo "See cdk/iam/github-cdk-deploy-role-policy.json for the full policy."
            echo "=========================================="
            exit 1
          fi

      - name: Cleanup summary
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          echo "=========================================="
          echo "Cleanup completed for environment: ${TARGET_ENV}"
          echo "=========================================="
          echo ""
          echo "Resources cleaned up:"
          echo "  - CDK stacks destroyed (Edge, Lambda, Queue, Storage)"
          echo "  - S3 buckets emptied and deleted (7 buckets)"
          if [ "${TARGET_ENV}" = "production" ]; then
            echo "  - SQS queues deleted (6 queues)"
          fi
          echo "  - CloudWatch Log Groups deleted (5 log groups)"
          echo ""
          echo "Note: Some resources may not have existed if this was a new environment."
