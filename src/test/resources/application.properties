# Allow the Micronaut blocking HTTP client to read binary (non-text) response bodies.
# Without this the client codec closes the connection on application/pdf responses.

# Enable local CORS filter for testing
complai.local-cors-enabled=true

# CORS allowed origin for testing
complai.cors.allowed-origin=http://localhost:5173

# Test-only JWT secret ? 32 random bytes encoded as Base64, used by JwtValidator during @MicronautTest.
# This value is not a real secret; it is only used in the local test environment.
# The same key is used in JwtAuthFilterTest and JwtValidatorTest to keep test tokens interoperable.
jwt.secret=hEmatrRKbxfC/9PxZ14VsYksRkTZHMpqRScBUhshYzQ=

# Disable response caching in tests to prevent test pollution
# Different test scenarios with the same question category should not share cached responses
response.cache.enabled=false


