# Format rules for system prompt
# These rules are consolidated from the multilingual system prompt to reduce verbosity
# and token count while preserving all required HTML formatting guidance.

# HTML formatting templates
format.bold.html=<strong>{text}</strong>
format.italic.html=<em>{text}</em>
format.link.html=<a href="{url}" target="_blank" rel="noopener noreferrer">{text}</a>
format.list.html=<ul><li>{item}</li></ul>
format.paragraph.html=<p>{text}</p>

# Format prohibitions (consolidated)
format.prohibited.markdown=**negreta**, __subratllat__, - llista amb guió, * llista amb asterisc, [text](URL)
format.prohibited.markdown.es=**negrita**, __subrayado__, - lista con guión, * lista con asterisco, [texto](URL)
format.prohibited.markdown.en=**bold**, __underline__, - bullet with dash, * bullet with asterisk, [text](URL)
