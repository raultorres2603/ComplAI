micronaut.application.name=complai
complai.input.max-length-chars=5000

# Register application/pdf as a binary type so the Micronaut Lambda runtime base64-encodes
# the response body in the Lambda JSON payload. Without this the raw PDF bytes are written
# as a UTF-8 string, which corrupts the binary data and produces a blank PDF on the client.
# The correct property is micronaut.function.binary-types.additional-types (BinaryTypeConfiguration).
# micronaut.function.binary-types.aws.binary-types is a Micronaut 3 property and has no effect in v4.
micronaut.function.binary-types.additional-types=application/pdf

# JWT secret: no value is set here. The JWT_SECRET environment variable is injected by CDK/SAM
# at runtime and is resolved by Micronaut's relaxed binding to the jwt.secret property key
# consumed by JwtValidator. The application will fail to start if JWT_SECRET is absent or
# encodes fewer than 256 bits ? there is no silent degradation to an insecure state.

# OIDC identity verification ? Option C of the citizen identity integration plan.
# When identity.verification.enabled=true (IDENTITY_VERIFICATION_ENABLED=true env var),
# POST /complai/redact accepts an optional X-Identity-Token header containing an OIDC ID
# token. When present, the IdP-verified name/surname/NIF override the self-reported body
# fields (requesterName, requesterSurname, requesterIdNumber). When the header is absent
# the request falls back to body fields as before ? existing consumers are unaffected.
#
# Required when enabled:
#   OIDC_ISSUER_URL  ? oidc.issuer.url  (expected "iss" claim)
#   OIDC_JWKS_URI    ? oidc.jwks.uri    (JWKS endpoint for signature validation)
#   OIDC_AUDIENCE    ? oidc.audience    (expected "aud" claim ? VALId client ID)
#
# Optional:
#   OIDC_NIF_CLAIM   ? oidc.nif.claim   (JWT claim containing the NIF/NIE; default: "sub")
#
# The OidcIdentityTokenValidator bean only loads when identity.verification.enabled=true.
# Micronaut @Requires ensures the worker Lambda never attempts to load it (no env vars set there).

