#Mon Feb 02 07:17:37 UTC 2026
micronaut.application.name=complai
complai.input.max-length-chars=5000

openrouter.url=https://openrouter.ai

# Register application/pdf as a binary type so the Micronaut Lambda runtime base64-encodes
# the response body in the Lambda JSON payload. Without this the raw PDF bytes are written
# as a UTF-8 string, which corrupts the binary data and produces a blank PDF on the client.
# The correct property is micronaut.function.binary-types.additional-types (BinaryTypeConfiguration).
# micronaut.function.binary-types.aws.binary-types is a Micronaut 3 property and has no effect in v4.
micronaut.function.binary-types.additional-types=application/pdf

# JWT secret: no value is set here. The JWT_SECRET environment variable is injected by CDK/SAM
# at runtime and is resolved by Micronaut's relaxed binding to the jwt.secret property key
# consumed by JwtValidator. The application will fail to start if JWT_SECRET is absent or
# encodes fewer than 256 bits ? there is no silent degradation to an insecure state.

# OIDC identity verification.
# Whether OIDC verification is active for a given city is controlled by the "enabled" flag
# in src/main/resources/oidc/oidc-mapping.json no global environment variable is needed.
# Cities with "enabled": true have their JWKS endpoint fetched at startup (fail-fast if
# unreachable). Cities with "enabled": false are skipped entirely at startup.
# To add or enable a city: edit oidc-mapping.json and redeploy.
# OidcIdentityTokenValidator only loads on the API Lambda (requires jwt.secret).

# Micronaut HTTP Client configuration for OpenRouter
# Connection timeout (configurable via env var for operational flexibility)
micronaut.http.client.connect-timeout=${HTTP_CLIENT_CONNECT_TIMEOUT:10s}
# Read timeout (configurable via env var, matches OPENROUTER_REQUEST_TIMEOUT_SECONDS)
micronaut.http.client.read-timeout=${HTTP_CLIENT_READ_TIMEOUT:60s}
# Connection pool size (configurable via env var for Lambda concurrency tuning)
micronaut.http.client.max-connections=${HTTP_CLIENT_MAX_CONNECTIONS:20}
# Enable connection reuse and keep-alive (always enabled for performance)
micronaut.http.client.connection-pool-enabled=true
# Enable HTTP/2 if supported (always enabled for better performance)
micronaut.http.client.http-version=HTTP_2_0
# Enable request compression (always enabled for efficiency)
micronaut.http.client.compression=true
# Enable response logging (configurable via env var - WARN for production, TRACE for debugging)
micronaut.http.client.log-level=${HTTP_CLIENT_LOG_LEVEL:WARN}
# Enable retry configuration (fallback retry, business retry uses OPENROUTER_MAX_RETRIES)
micronaut.http.client.retry-enabled=true
micronaut.http.client.retry-attempts=2

